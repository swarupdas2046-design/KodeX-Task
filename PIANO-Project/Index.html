<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Virtual Piano</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Made by Swarup Das 🎹</h1>
      <p>You Pressed: <span id="keyDisplay">None</span></p>

      <div class="piano">
        <!-- White Keys -->
        <div class="key white" data-key="A">A</div>
        <div class="key white" data-key="S">S</div>
        <div class="key white" data-key="D">D</div>
        <div class="key white" data-key="F">F</div>
        <div class="key white" data-key="G">G</div>
        <div class="key white" data-key="H">H</div>
        <div class="key white" data-key="J">J</div>
        <div class="key white" data-key="K">K</div>
        <div class="key white" data-key="L">L</div>

        <!-- Black Keys -->
        <div class="key black" data-key="W" style="left: 8%">W</div>
        <div class="key black" data-key="E" style="left: 18%">E</div>

        <div class="key black" data-key="T" style="left: 38%">T</div>
        <div class="key black" data-key="Y" style="left: 48%">Y</div>
        <div class="key black" data-key="U" style="left: 58%">U</div>

        <div class="key black" data-key="O" style="left: 78%">O</div>
        <div class="key black" data-key="P" style="left: 88%">P</div>
      </div>
    </div>
    <!-- white keys audio files -->
    <audio src="./28.mp3"></audio>
    <audio src="./29.mp3"></audio>
    <audio src="./30.mp3"></audio>
    <audio src="./31.mp3"></audio>
    <audio src="./32.mp3"></audio>
    <audio src="./33.mp3"></audio>
    <audio src="./46.mp3"></audio>
    <audio src="./35.mp3"></audio>
    <audio src="./40.mp3"></audio>

     <!-- black keys audio files -->

    <audio src="./47.mp3"></audio>
    <audio src="./48.mp3"></audio>
    <audio src="./49.mp3"></audio>
    <audio src="./50.mp3"></audio>
    <audio src="./52.mp3"></audio>
    <audio src="./54.mp3"></audio>
    <audio src="./55.mp3"></audio>
    <script src="script.js"></script>
  </body>
</html>
